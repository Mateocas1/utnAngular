<div class="new-chat">
  <header class="new-chat__header">
    <h2 class="new-chat__title">Nuevo chat</h2>
  </header>

  <form class="new-chat__form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-field">
      <label class="form-field__label" for="contactName">Nombre del contacto</label>
      <input
        id="contactName"
        class="form-field__input"
        [class.form-field__input--error]="nameErrors"
        type="text"
        formControlName="name"
        placeholder="Ej: María González"
        autocomplete="off"
      />
      @if (nameErrors) {
        @if (form.controls.name.errors?.['required']) {
          <span class="form-field__error">El nombre es obligatorio.</span>
        } @else if (form.controls.name.errors?.['minlength']) {
          <span class="form-field__error">Mínimo 2 caracteres.</span>
        } @else if (form.controls.name.errors?.['maxlength']) {
          <span class="form-field__error">Máximo 40 caracteres.</span>
        }
      }
    </div>

    <div class="form-field">
      <label class="form-field__label" for="contactStatus">Estado inicial</label>
      <select
        id="contactStatus"
        class="form-field__input form-field__select"
        formControlName="status"
      >
        @for (s of statuses; track s.value) {
          <option [value]="s.value">{{ s.label }}</option>
        }
      </select>
    </div>

    <div class="new-chat__actions">
      <button type="button" class="btn btn--secondary" (click)="cancel()">Cancelar</button>
      <button type="submit" class="btn btn--primary">Crear chat</button>
    </div>
  </form>
</div>
