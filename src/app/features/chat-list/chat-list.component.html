<aside class="sidebar">
  <header class="sidebar__header">
    <div>
      <p class="sidebar__eyebrow">Panel de conversaciones</p>
      <h1 class="sidebar__title">Chats</h1>
    </div>
    <div class="sidebar__actions">
      <button
        class="sidebar__btn-theme"
        (click)="themeToggle.emit()"
        [attr.aria-label]="isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
        [attr.title]="isDark() ? 'Modo claro' : 'Modo oscuro'"
      >
        @if (isDark()) {
          <!-- sol -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <!-- luna -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>
      <button class="sidebar__btn-new" (click)="navigateToNew()" aria-label="Nuevo chat" title="Nuevo chat">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="sidebar__search">
    <svg class="sidebar__search-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
         viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input
      class="sidebar__search-input"
      type="text"
      placeholder="Buscar chats..."
      [(ngModel)]="searchTerm"
      (ngModelChange)="onSearchChange()"
      aria-label="Buscar chats"
    />
  </div>

  <div class="sidebar__summary">
    <span class="sidebar__summary-label">Conversaciones activas</span>
    <span class="sidebar__summary-value">{{ chats().length }}</span>
  </div>

  <nav class="sidebar__list">
    @for (chat of chats(); track chat.id) {
      <a
        [routerLink]="['/chats', chat.id]"
        routerLinkActive="active-link"
        class="sidebar__link"
        [attr.aria-label]="'Chat con ' + chat.contact.name"
      >
        <app-contact-item [chat]="chat" />
      </a>
    } @empty {
      <p class="sidebar__empty">No se encontraron chats.</p>
    }
  </nav>
</aside>
